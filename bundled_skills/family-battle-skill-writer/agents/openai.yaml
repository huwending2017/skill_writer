interface:
  display_name: "Battle Skill Writer"
  short_description: "Implement or iterate single, independent-batch, or linked battle skills for repos with xgame_server/service/battle."
  default_prompt: "Use $family-battle-skill-writer to resolve the current battle root in this workspace, use <battle_root>/SKILL_DEV_GUIDE.md plus the knowledge index under <battle_root>/temp_skill_workspace/_global/_battle_knowledge_cache/ and the built-in catalogs as the primary cached knowledge base, refresh the knowledge index if it is missing or stale, avoid a full-engine reread unless the guide is missing or stale or the user explicitly asks for re-audit, first classify the request as new skill, independent batch, linked bundle, repair, or existing-skill iteration, keep independent skills runtime-independent, and when an independent batch contains multiple unrelated skills, split them into separate lanes that may run reuse audit, implementation, and per-skill tests in parallel when the environment supports it, then merge only after all lanes are ready and perform a final collision/order/writeback review, treat linked skills as generic A-affects-B mechanisms rather than fixed skill categories, for existing-skill iteration read the named old script/payload/task folder first and preserve old behavior when the new mechanism is absent, run a targeted indexed reuse audit against existing actions, buffs, add_state patterns, script.extern mutation patterns, and customized_buff_state patterns, open the top matched candidate files before rejecting reuse, minimize new scripts, generate temporary config structures, implement only the truly missing mechanisms, verify trigger order/conflicts/war report/statistics behavior, and update the mechanism catalog or battle guide only when new reusable knowledge is confirmed."
